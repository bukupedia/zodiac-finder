<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Zodiac App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="text-center py-4">
<h1>Birthday Zodiac Finder</h1>
</header>

<main class="container">

<section class="card p-4">

<h2 class="mb-3">Enter Your Birthdate</h2>

<form id="birthdayForm">

<div class="row g-3">

<div class="col-md-4">
<label class="form-label">Day</label>
<input type="number" id="day" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Month</label>
<input type="number" id="month" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Year</label>
<input type="number" id="year" class="form-control" required>
</div>

</div>

<button class="btn btn-primary mt-4" type="submit">
Calculate
</button>

</form>

</section>

<section id="results" class="mt-4 card p-4">

<h3>Results</h3>

<p><strong>Day of Birth:</strong> <span id="dayResult">-</span></p>
<p><strong>Zodiac Sign:</strong> <span id="zodiacResult">-</span></p>
<p><strong>Chinese Zodiac:</strong> <span id="chineseResult">-</span></p>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
